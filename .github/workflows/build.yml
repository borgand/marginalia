# GitHub Actions workflow for building, testing, verifying, and preparing plugin release drafts:
# - Build the plugin ZIP with the 'buildPlugin' task and upload it as a workflow artifact.
# - Run the 'check' task and upload test reports on failure.
# - Run the 'verifyPlugin' task and upload Plugin Verifier reports.
# - Create a draft GitHub release on non-pull-request runs.
#
# The workflow is triggered on pushes to the 'main' branch and on pull_request events.
#
# GitHub Actions reference: https://docs.github.com/actions
#
## JBIJPPTPL

name: Build
on:
  # Trigger the workflow on pushes to only the 'main' branch (this avoids duplicate checks being run e.g., for dependabot pull requests)
  push:
    branches: [ main ]
  # Trigger the workflow on any pull request
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:

  # Prepare the environment and build the plugin
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:

      # Free GitHub Actions Environment Disk Space
      - name: Maximize Build Space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          large-packages: false

      # Check out the current repository
      - name: Fetch Sources
        uses: actions/checkout@v7

      # Set up the Java environment for the next steps
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21

      # Setup Gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      # Build plugin
      - name: Build plugin
        run: ./gradlew buildPlugin

      # Store an already-built plugin as an artifact for downloading
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: plugin-distribution
          path: ./build/distributions/*.zip

  # Run tests and upload test reports on failure
  test:
    name: Test
    needs: [ build ]
    runs-on: ubuntu-latest
    steps:

      # Free GitHub Actions Environment Disk Space
      - name: Maximize Build Space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          large-packages: false

      # Check out the current repository
      - name: Fetch Sources
        uses: actions/checkout@v7

      # Set up the Java environment for the next steps
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21

      # Setup Gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: true

      # Run tests
      - name: Run Tests
        run: ./gradlew check

      # Collect Tests Result of failed tests
      - name: Collect Tests Result
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: tests-result
          path: ${{ github.workspace }}/build/reports/tests

  # Run plugin structure verification along with IntelliJ Plugin Verifier
  verify:
    name: Verify plugin
    needs: [ build ]
    runs-on: ubuntu-latest
    steps:

      # Free GitHub Actions Environment Disk Space
      - name: Maximize Build Space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          large-packages: false

      # Check out the current repository
      - name: Fetch Sources
        uses: actions/checkout@v7

      # Set up the Java environment for the next steps
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21

      # Setup Gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: true

      # Run Verify Plugin task and IntelliJ Plugin Verifier tool
      - name: Run Plugin Verification tasks
        run: ./gradlew verifyPlugin

      # Collect Plugin Verifier Result
      - name: Collect Plugin Verifier Result
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: pluginVerifier-result
          path: ${{ github.workspace }}/build/reports/pluginVerifier

  # Prepare a draft release for GitHub Releases page for the manual verification
  # If accepted and published, the release workflow would be triggered
  releaseDraft:
    name: Release draft
    if: github.event_name != 'pull_request'
    needs: [ build, test, verify ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:

      # Check out the current repository
      - name: Fetch Sources
        uses: actions/checkout@v7

      # Set up the Java environment for the next steps
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21

      # Setup Gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: true

      # Pull the plugin ZIP built by the 'build' job so it can be attached to the release draft
      - name: Download plugin artifact
        uses: actions/download-artifact@v7
        with:
          name: plugin-distribution
          path: build/distributions

      # Remove old release drafts by using the curl request for the available releases with a draft flag
      - name: Remove Old Release Drafts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/{owner}/{repo}/releases \
            --jq '.[] | select(.draft == true) | .id' \
            | xargs -r -I '{}' gh api -X DELETE repos/{owner}/{repo}/releases/{}

      # Create a new release draft which is not publicly visible and requires manual acceptance.
      # The body is prefilled from the CHANGELOG.md section matching the version being released,
      # and the built plugin ZIP is attached so the release serves an installable plugin (not
      # just GitHub's auto-generated source archive).
      - name: Create Release Draft
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(./gradlew properties --property version --quiet --console=plain | tail -n 1 | cut -f2- -d ' ')
          RELEASE_NOTE="./build/tmp/release_note.txt"
          mkdir -p "$(dirname "$RELEASE_NOTE")"

          # Extract the exact "## [<section>]" block from CHANGELOG.md (literal match, so it
          # never falls through to another version's notes the way `getChangelog` can).
          extract_section() {
            awk -v header="## [$1]" '
              index($0, header) == 1 { flag = 1; next }
              flag && /^## \[/ { exit }
              flag { print }
            ' CHANGELOG.md
          }

          # Prefer the section for the version being released, then [Unreleased], then a
          # minimal placeholder — the draft body is never empty and never the wrong version.
          extract_section "$VERSION" > "$RELEASE_NOTE"
          if ! grep -q '[^[:space:]]' "$RELEASE_NOTE"; then
            echo "::warning::No '## [$VERSION]' section in CHANGELOG.md; using [Unreleased]."
            extract_section "Unreleased" > "$RELEASE_NOTE"
          fi
          if ! grep -q '[^[:space:]]' "$RELEASE_NOTE"; then
            echo "::warning::No changelog notes found for $VERSION; using a placeholder body."
            printf 'Release %s\n' "$VERSION" > "$RELEASE_NOTE"
          fi

          gh release create "$VERSION" \
            --draft \
            --title "$VERSION" \
            --notes-file "$RELEASE_NOTE"

          # Attach the installable plugin ZIP (marginalia-<version>.zip) to the draft.
          gh release upload "$VERSION" build/distributions/*.zip --clobber
